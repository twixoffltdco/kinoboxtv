name: GGHost Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Upload to GGHost
        uses: actions/upload-artifact@v4
        with:
          name: gghost-build
          path: dist
